name: CI

# Repo PUBLIC => minutes CI ILLIMITEES (macOS inclus, pas de multiplicateur x10). Suite LEGERE.
# paths STRICTS (seulement le code/tests) + cancel-in-progress + cache npm => cout par push minimal.
# La matrice OS est ICI le POINT : elle exerce les branches POSIX (ps, kill -pid, spawn detached)
# que la machine Windows de dev ne peut pas prouver. Linux + macOS (BSD) + Windows = vraie preuve
# cross-OS sur les 3 familles que l'equipe utilise. NE PAS retirer macOS (ps BSD != ps GNU).
on:
  push:
    branches: [master]
    paths: ['src/**', 'tests/**', 'spec/**', 'package.json', 'package-lock.json', 'stryker.conf.json', '.github/workflows/ci.yml']
  pull_request:
    branches: [master]
    paths: ['src/**', 'tests/**', 'spec/**', 'package.json', 'package-lock.json', 'stryker.conf.json', '.github/workflows/ci.yml']

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Suite complete sur les DEUX OS => exerce treeKill/listProcesses/detached cote POSIX ET Windows.
  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  # Gate mutation sur les fonctions PURES uniquement (OS-agnostiques) => ubuntu seul suffit.
  # Parallele au job test (aucun `needs:` : le wall = le job le plus long, pas la somme).
  mutation:
    name: Gate mutation (Stryker, break=94)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:mut

  # Gate VERIF FORMELLE du verrou fichier (TLA+/TLC) — ~5s, OS-agnostique => ubuntu seul.
  # Prouve l'exclusion mutuelle du protocole de vol de verrou (spec/SupervisorLock.tla, config Fixed)
  # ET verifie que le negative-check (config Buggy) trouve toujours la violation (spec non creuse).
  spec:
    name: Gate verif formelle (TLA+/TLC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Télécharger tla2tools.jar
        run: curl -sL -o spec/tla2tools.jar https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar
      - run: npm run test:spec

  # Gates couplage (jscpd cliquet + dependency-cruiser no-circular) — ~30s, par-push OK.
  coupling:
    name: Gates couplage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run coupling
